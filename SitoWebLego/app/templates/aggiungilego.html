{% extends 'base.html' %}

{% block title %}Aggiungi Set LEGO{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2>Aggiungi un Nuovo Set LEGO</h2>

    <div class="alert alert-info mt-3" style="font-size: 14px;">
        ➜ I campi con <b>*</b> sono obbligatori
    </div>

    <form method="post">

        <div class="form-group">
            <label>Nome Set *</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Numero Set *</label>
            <input type="text" name="set_number" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Pezzi</label>
            <input type="number" name="pieces" class="form-control">
        </div>

        <div class="form-group">
            <label>Anno</label>
            <input type="number" name="year" class="form-control">
        </div>

        <div class="form-group">
            <label>Descrizione</label>
            <textarea name="description" class="form-control"></textarea>
        </div>

        <div class="form-group">
            <label>Immagine (URL)</label>
            <input type="text" name="image_url" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary mt-3">
            Aggiungi LEGO
        </button>

    </form>

</div>

{% endblock %}
