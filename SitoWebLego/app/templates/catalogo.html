{% extends "base.html" %}

{% block content %}

<style>
.lego-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    margin-top: 30px;
    padding: 10px;
}

.lego-card {
    background: #f2f2f2;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    text-decoration: none;
    color: black;
    transition: 0.2s;
}

.lego-card img {
    width: 100%;
    border-radius: 8px;
}

.lego-card p {
    margin-top: 10px;
    font-weight: bold;
}

.prezzo {
    font-size: 14px;
    color: #444;
    margin-top: 5px;
}

.lego-card:hover {
    transform: scale(1.05);
    background: #e6e6e6;
}
</style>
