{% extends 'base.html' %}

{% block title %}Registrazione - La Mia Collezione LEGO{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div style="text-align: center; margin-bottom: 40px;">
        <div style="font-size: 64px; margin-bottom: 20px;"></div>
        <h1 style="color: #5370f1; margin-bottom: 10px;">Unisciti a Noi</h1>
        <p style="color: #989898;">Crea il tuo account per gestire la tua collezione LEGO</p>
    </div>

    <form method="post">
        <style>
            .form-group {
                margin-bottom: 20px;
            }
            
            label {
                display: block;
                margin-bottom: 8px;
                color: #333;
                font-weight: 600;
            }
            
            input[type="text"],
            input[type="password"],
            input[type="email"] {
                width: 100%;
                padding: 12px;
                border: 2px solid #e0e0e0;
                border-radius: 5px;
                font-size: 16px;
                transition: border-color 0.3s ease;
            }
            
            input[type="text"]:focus,
            input[type="password"]:focus,
            input[type="email"]:focus {
                outline: none;
                border-color: #5370f1;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }
            
            button {
                width: 100%;
                padding: 12px;
                background: linear-gradient(135deg, #5370f1 0%, #764ba2 100%);
                color: white;
                border: none;
                border-radius: 5px;
                font-size: 18px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }
        </style>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Scegli un username">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Inserisci la tua email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Inserisci una password sicura">
        </div>

        <div class="form-group">
            <label for="confirm_password">Conferma Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Ripeti la password">
        </div>

        <button type="submit">Registrati</button>

    </form>

    <div style="text-align: center; margin-top: 25px; color: #989898;">
        Hai già un account? <a href="/login" style="color: #5571f0; text-decoration: none; font-weight: 600;">Accedi qui</a>
    </div>
</div>
{% endblock %}
