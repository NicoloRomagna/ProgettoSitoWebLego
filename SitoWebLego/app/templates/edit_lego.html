{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Modifica LEGO</h2>

    <form method="POST">

        <input class="form-control mb-2"
               name="name"
               value="{{ lego.name }}"
               required>

        <input class="form-control mb-2"
               name="set_number"
               value="{{ lego.set_number }}"
               required>

        <input class="form-control mb-2"
               name="pieces"
               value="{{ lego.pieces or '' }}"
               placeholder="Pezzi">

        <input class="form-control mb-2"
               name="year"
               value="{{ lego.year or '' }}"
               placeholder="Anno">

        <textarea class="form-control mb-2"
                  name="description">{{ lego.description }}</textarea>

        <input class="form-control mb-2"
               type="number"
               step="0.01"
               name="price"
               value="{{ lego.price or '' }}"
               placeholder="Prezzo (€)">

        <div class="form-check mb-3">
            <input class="form-check-input"
                   type="checkbox"
                   name="is_minifigure"
                   value="1"
                   {% if lego.is_minifigure %}checked{% endif %}>
            <label class="form-check-label">
                È una minifigure?
            </label>
        </div>

        <input class="form-control mb-2"
               name="image_url"
               value="{{ lego.image or '' }}"
               placeholder="URL immagine">

        <button class="btn green_button" type="submit">
            Salva modifiche
        </button>

    </form>

</div>

{% endblock %}
