<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lego World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
        }

        .card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(155, 46, 46, 0.137);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-light" style="background-color:#facc15;">
    <div class="container d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">

            <img src="https://loghi-famosi.com/wp-content/uploads/2020/10/LEGO-Logo-1972-1998.png"
                 alt="LEGO Logo"
                 style="height:90px;">

            <a class="navbar-brand m-0 text-dark" href="{{ url_for('main.index') }}">
                Lego World
            </a>
        </div>

        <div class="d-flex gap-2">

            <a href="{{ url_for('auth.login') }}"
               class="btn btn-dark btn-sm">
                Login
            </a>

            <a href="{{ url_for('auth.register') }}"
               class="btn btn-sm text-white"
               style="background-color:#3b82f6; border:none;">
                Registrati
            </a>

        </div>

    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
