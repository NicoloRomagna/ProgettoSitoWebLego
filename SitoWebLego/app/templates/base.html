<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lego World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.7rem;
        }

        .card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(155, 46, 46, 0.137);
        }

        .green_button {
            width: 17%;
            padding: 12px;
            background: linear-gradient(135deg, #95f185 0%, #025716 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 3px;
        }

        .lego-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .lego-card {
            background: #f2f2f2;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: black;
            transition: 0.2s;
        }

        .lego-card img {
            width: 100%;
            border-radius: 8px;
        }

        .lego-card p {
            margin-top: 10px;
            font-weight: bold;
        }

        .lego-card:hover {
            transform: scale(1.05);
            background: #e6e6e6;
        }

        .lego-l { color: rgb(246, 7, 7); }
        .lego-e { color: rgb(254, 221, 33); }
        .lego-g { color: rgb(11, 179, 11); }
        .lego-o { color: rgb(7, 59, 245); }

        .table-lego {
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #facc15;
        }

        .table-lego thead {
            background: linear-gradient(90deg, #facc15, #f97316);
            color: #111827;
            font-weight: 700;
        }

        .table-lego td, .table-lego th {
            vertical-align: middle;
            text-align: center;
        }

        .table-lego img {
            width: 90px;
            border-radius: 6px;
            border: 2px solid #e5e7eb;
        }

        .btn-edit, .btn-delete {
            display: inline-block;
            width: 110px;
            padding: 6px 0;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 999px;
            border: none;
            color: #fff;
            text-align: center;
        }

        .btn-edit {
            background: linear-gradient(135deg, #33e072, #086b2d);
        }

        .btn-edit:hover {
            background: linear-gradient(135deg, #16a34a, #166534);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ee5f5f, #a50f0f);
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #dc2626, #991b1b);
        }

        .add_lego {
            background: linear-gradient(135deg, #ffd941, #fc5e10);
            color: #111827;
            font-weight: 800;
            border-radius: 999px;
            border: 2px solid #fbbf24;
            padding: 8px 20px;
        }

        .add_lego:hover {
            background: linear-gradient(135deg, #fbbf24, #fb923c);
        }

        .badge-minifigure {
            background: linear-gradient(135deg, #00d5ff, #000ad1);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-light" style="background-color:#f3bf13;">
    <div class="container d-flex justify-content-start align-items-center">

        <div class="d-flex align-items-center gap-2" style="justify-content:flex-start;">
            <img src="https://loghi-famosi.com/wp-content/uploads/2020/10/LEGO-Logo-1972-1998.png"
                 alt="LEGO Logo"
                 style="height:75px;">
                 

            <a class="navbar-brand m-0 text-dark" href="{{ url_for('main.index') }}">
                Lego World
            </a>
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
